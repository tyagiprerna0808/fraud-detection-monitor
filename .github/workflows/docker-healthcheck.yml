name: Docker Build and Health Check

on:
push:
branches: [ "main" ]
workflow_dispatch:

jobs:
docker-health:
runs-on: ubuntu-latest

steps:
- name: Checkout repository
uses: actions/checkout@v4

- name: Build Docker image
run: docker build -t fraud-detection-monitor:ci .

- name: Run container
run: docker run -d --name fraud-app -p 8000:8000 fraud-detection-monitor:ci

- name: Wait for API startup and call health endpoint
run: |
for i in {1..30}; do
if curl -sSf http://localhost:8000/health > health.json; then
echo "Health endpoint is ready."
break
fi
echo "Waiting for API startup... attempt $i"
sleep 2
done

echo "Health response:"
cat health.json

- name: Show container logs
if: always()
run: docker logs fraud-app || true

- name: Stop and remove container
if: always()
run: |
docker stop fraud-app || true
docker rm fraud-app || true
