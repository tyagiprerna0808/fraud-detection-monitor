name: Docker Build and Health Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-health:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Dockerfile exists
        run: ls -la

      - name: Build Docker image
        run: docker build -t fraud-detection-monitor:ci .

      - name: Run container
        run: docker run -d --name fraud-app -p 8000:8000 fraud-detection-monitor:ci

      - name: Wait and call health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health > health.json; then
              echo "Health endpoint is ready"
              cat health.json
              exit 0
            fi
            echo "Waiting for startup attempt $i"
            sleep 2
          done
          echo "Health check failed"
          docker logs fraud-app
          exit 1

      - name: Cleanup container
        if: always()
        run: docker rm -f fraud-app || true
