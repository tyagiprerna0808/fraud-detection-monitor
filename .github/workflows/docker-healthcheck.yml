name: Docker Build and Health Check

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  docker-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify project files
        run: ls -la

      - name: Build Docker image
        run: docker build -t fraud-detection-monitor:ci .

      - name: Run container
        run: docker run -d --name fraud-app -e PORT=8000 -p 8000:8000 fraud-detection-monitor:ci

      - name: Confirm container is running
        run: |
          docker ps -a
          if [ "$(docker inspect -f '{{.State.Running}}' fraud-app)" != "true" ]; then
            echo "Container exited unexpectedly"
            docker logs fraud-app || true
            exit 1
          fi

      - name: Wait and call health endpoint
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health > health.json; then
              echo "Health endpoint is ready"
              echo "Health response:"
              cat health.json
              exit 0
            fi
            echo "Waiting for startup attempt $i"
            sleep 2
          done
          echo "Health check failed"
          docker ps -a
          docker logs fraud-app
          exit 1

      - name: Wait and call readiness endpoint
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:8000/health/ready > ready.json; then
              echo "Readiness endpoint is ready"
              echo "Readiness response:"
              cat ready.json
              exit 0
            fi
            echo "Waiting for readiness attempt $i"
            sleep 2
          done
          echo "Readiness check failed"
          docker ps -a
          docker logs fraud-app
          exit 1

      - name: Cleanup container
        if: always()
        run: docker rm -f fraud-app || true
